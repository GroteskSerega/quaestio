server:
  port: ${APP_PORT:8080}

app:
  maxRetriesForDeadLock: 3
  searchEngineForkJoinPoolLimit: 4
  secondsWaitForGetStatisticsPool: 5

search:
  percent-ignore-lemmas-too-match-found: ${PERCENT_IGNORE_LEMMAS:45}

spring:
  application:
    name: quastio
    version: 1.0.0
  datasource:
    username: ${DB_USERNAME:search_user}
    password: ${DB_PASSWORD:search_password}
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:search_engine}?${DB_ADDITIONAL_PARAMS:useSSL-false&requireSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 48
      connection-timeout: 40000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        #dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  liquibase:
    enabled: ${SPRING_LIQUIBASE_ENABLED:true}
    change-log: classpath:/db/changelog/db.changelog-master.xml

jsoup-settings:
  user-agent: QuastioSearchBot
  #user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/143.0.0.0 Safari/537.36
  referrer: http://www.google.com

